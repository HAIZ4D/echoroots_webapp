    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <title>EchoRoots — Echoing Ancestral Voices into the Digital Future</title>
    <!-- importmap must come before any module scripts so the browser can resolve
         bare 'three' specifiers used inside Three.js addon files (OrbitControls,
         GLTFLoader, FBXLoader, etc.) that TalkingHead loads from unpkg CDN -->
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
